services:
  backend:
    build: ./backend
    container_name: student-backend
    volumes:
      - student-data:/app/data
    expose:
      - "5001"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: student-frontend
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    build: ./nginx
    container_name: student-nginx
    ports:
      - "8080:80"
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  student-data:
